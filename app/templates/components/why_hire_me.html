<section id="why-hire-me" class="content-section">
    <div class="section-heading">
        <p class="eyebrow">Core Competencies</p>
        <h2>Why Hire Me</h2>
    </div>

    <div class="why-hire-grid">
        {% for entry in why_hire_entries %}
        <article class="card why-card">
            <div class="why-card-icon">{{ entry.icon }}</div>
            <h3>{{ entry.title }}</h3>
            <ul>
                {% for point in entry.points.split('\n') %}
                    {% if point.strip() %}
                        <li>{{ point.strip() }}</li>
                    {% endif %}
                {% endfor %}
            </ul>
        </article>
        {% endfor %}
    </div>
</section>
