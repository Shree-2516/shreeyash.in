<section class="hero-panel">
    <!-- Left: Profile Image -->
    <div class="hero-avatar-container">
        <img class="hero-avatar" src="{{ profile.profile_photo_url }}" alt="{{ profile.name }}">
    </div>

    <!-- Center: Core Information -->
    <div class="hero-copy">
        <p class="eyebrow">Interactive Portfolio</p>
        <h1>{{ profile.name }}</h1>
        
        <div class="hero-badges">
            <span class="hero-badge">Python Backend Developer</span>
            <span class="hero-badge">AI / ML Engineer</span>
            <span class="hero-badge">Data Science Intern</span>
        </div>

        <p class="hero-text">
            Building AI systems, backend services, and data-driven applications.
        </p>

        <div class="hero-actions">
            <a class="button button-primary" href="{{ profile.resume_link }}">Download Resume</a>
            <button class="button button-secondary" onclick="scrollToProjects()">View Projects</button>
        </div>

        <div class="hero-socials">
            <a class="social-link" href="{{ profile.linkedin_url }}" target="_blank" rel="noreferrer">
                <span>IN</span> LinkedIn
            </a>
            <a class="social-link" href="{{ profile.github_url }}" target="_blank" rel="noreferrer">
                <span>GH</span> GitHub
            </a>
            <a class="social-link" href="mailto:{{ profile.email }}">
                <span>✉</span> Email
            </a>
        </div>
    </div>

    <!-- Right: Skill Dashboard -->
    <div class="hero-skills-dashboard">
        <h3>System Metrics</h3>
        
        <div class="dashboard-skill">
            <div class="skill-info">
                <span>Python</span>
                <span>90%</span>
            </div>
            <div class="skill-bar-container">
                <div class="skill-bar" style="width: 90%;"></div>
            </div>
        </div>

        <div class="dashboard-skill">
            <div class="skill-info">
                <span>Flask</span>
                <span>80%</span>
            </div>
            <div class="skill-bar-container">
                <div class="skill-bar" style="width: 80%;"></div>
            </div>
        </div>

        <div class="dashboard-skill">
            <div class="skill-info">
                <span>Machine Learning</span>
                <span>80%</span>
            </div>
            <div class="skill-bar-container">
                <div class="skill-bar" style="width: 80%;"></div>
            </div>
        </div>

        <div class="dashboard-skill">
            <div class="skill-info">
                <span>SQL</span>
                <span>85%</span>
            </div>
            <div class="skill-bar-container">
                <div class="skill-bar" style="width: 85%;"></div>
            </div>
        </div>

        <div class="dashboard-skill">
            <div class="skill-info">
                <span>AWS</span>
                <span>60%</span>
            </div>
            <div class="skill-bar-container">
                <div class="skill-bar" style="width: 60%;"></div>
            </div>
        </div>
    </div>
</section>
