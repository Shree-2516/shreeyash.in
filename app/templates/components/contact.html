<section id="contact" class="content-section">
    <div class="contact-container">
        <h2>Let's Build Something Impactful</h2>
        
        <p class="contact-text">
            Open to opportunities in Python Backend Development, AI Engineering, Machine Learning, Data Science, Data Engineering, and Analytics.
        </p>

        <div class="contact-actions">
            <a class="button button-primary" href="{{ profile.linkedin_url }}" target="_blank" rel="noreferrer">LinkedIn</a>
            <a class="button button-secondary" href="{{ profile.github_url }}" target="_blank" rel="noreferrer">GitHub</a>
            <a class="button button-secondary" href="mailto:{{ profile.email }}">Email Me</a>
            <a class="button button-secondary" href="{{ profile.resume_url }}">Download Resume</a>
        </div>
    </div>
</section>
