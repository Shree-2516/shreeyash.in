{% extends "base.html" %}

{% block content %}
<main class="page-shell">
    <section class="admin-shell narrow">
        <p class="eyebrow">Admin Creation</p>
        <h2>Create Admin Account</h2>
        <p class="hero-text">Create a new admin account to access the control plane.</p>

        <form class="admin-form" action="{{ url_for('admin.register') }}" method="post">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required autocomplete="username">

            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="new-password">

            <label for="confirm_password">Confirm Password</label>
            <input id="confirm_password" name="confirm_password" type="password" required autocomplete="new-password">

            <div class="admin-actions">
                <button class="button" type="submit">Register</button>
                <a class="button button-secondary" href="{{ url_for('admin.login') }}">Back to Login</a>
            </div>
        </form>
    </section>
</main>
{% endblock %}
