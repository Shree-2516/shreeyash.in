{% extends "base.html" %}

{% block content %}
<main class="page-shell">
    <section class="admin-shell">
        <p class="eyebrow">Admin / Add Certificate</p>
        <h2>Create a Certificate Entry</h2>
        <p class="hero-text">Configure credentials, issue organizations, and skills covered for the recruiter validation grid.</p>

        <form class="admin-form" action="{{ url_for('admin.add_certificate') }}" method="post" enctype="multipart/form-data">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;">
                <div>
                    <label for="name">Certificate Name</label>
                    <input id="name" name="name" type="text" required placeholder="e.g. AWS Certified Solutions Architect">
                </div>
                <div>
                    <label for="organization">Issuing Organization</label>
                    <input id="organization" name="organization" type="text" required placeholder="e.g. Amazon Web Services (AWS)">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                <div>
                    <label for="issue_date">Issue Date</label>
                    <input id="issue_date" name="issue_date" type="text" placeholder="e.g. October 2024">
                </div>
                <div>
                    <label for="display_order">Display Order</label>
                    <input id="display_order" name="display_order" type="number" value="0">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;">
                <div>
                    <label for="credential_id">Credential ID</label>
                    <input id="credential_id" name="credential_id" type="text" placeholder="e.g. AWS-SEC-12345">
                </div>
                <div>
                    <label for="credential_url">Credential URL</label>
                    <input id="credential_url" name="credential_url" type="text" placeholder="https://credentials.example.com/...">
                </div>
            </div>

            <div>
                <label for="skills_covered">Skills Covered (comma separated)</label>
                <input id="skills_covered" name="skills_covered" type="text" placeholder="Cloud Computing, IAM, EC2, S3">
            </div>

            <div style="display: flex; align-items: center; gap: 10px; margin: 8px 0;">
                <input id="featured" name="featured" type="checkbox" style="width: auto;">
                <label for="featured" style="margin: 0; cursor: pointer;">Feature this certificate on the homepage</label>
            </div>

            <div>
                <label for="image">Certificate Badge / Image</label>
                <input id="image" name="image" type="file" accept=".png,.jpg,.jpeg,.gif,.webp">
            </div>

            <div class="admin-actions">
                <button class="button" type="submit">Save Certificate</button>
                <a class="button button-secondary" href="{{ url_for('admin.dashboard') }}#certificates">Cancel</a>
            </div>
        </form>
    </section>
</main>
{% endblock %}
